name: deploy-book

on:
  push:
    branches:
      - '**'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Prefer GH_PAT if present, otherwise fall back to GITHUB_TOKEN
  GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || secrets.GITHUB_TOKEN }}

  PRIMARY_BRANCH: ${{ vars.PRIMARY_BRANCH != '' && vars.PRIMARY_BRANCH || 'main' }}
  BEHAVIOR_PRIMARY: ${{ vars.BEHAVIOR_PRIMARY != '' && vars.BEHAVIOR_PRIMARY || 'move' }}
  BRANCH_ALIASES: ${{ vars.BRANCH_ALIASES }}
  BRANCHES_TO_DEPLOY: ${{ vars.BRANCHES_TO_DEPLOY != '' && vars.BRANCHES_TO_DEPLOY || '*' }}
  BRANCHES_TO_PREPROCESS: ${{ vars.BRANCHES_TO_PREPROCESS }}
  BRANCHES_ARCHIVED: ${{ vars.BRANCHES_ARCHIVED }}

jobs:
  get-branches:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      branches: ${{ steps.set-branches.outputs.branches }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-branches
        name: Set branches
        shell: bash
        run: |
          set -euo pipefail

          if [ "$BRANCHES_TO_DEPLOY" = "*" ]; then
            branches=$(git branch -r | sed 's,^[[:space:]]*origin/,,g' | grep -v '\->')
          else
            branches=$(echo "$BRANCHES_TO_DEPLOY" | tr ' ' '\n' | grep -E '\S' || true)
          fi

          echo "$branches" | tr ' ' '\n' > branches.txt
          branches_json=$(printf '%s\n' "$branches" | jq -Rn '[inputs | select(length > 0)]')
          echo "branches=$branches_json" >> "$GITHUB_OUTPUT"

      - name: Validate aliases
        shell: bash
        run: |
          set -euo pipefail

          echo "${BRANCH_ALIASES:-}" | tr ' ' '\n' | grep -E '\S' > rules.txt || true
          cut -d: -f1 rules.txt > aliases.txt || true
          cut -d: -f2 rules.txt > targets.txt || true

          if [ -s aliases.txt ]; then
            while IFS= read -r alias; do
              if grep -Fxq "$alias" branches.txt; then
                echo "::error ::Alias \"$alias\" given in \$BRANCH_ALIASES conflicts with existing branch."
                exit 1
              fi
            done < aliases.txt
          fi

          if [ -s targets.txt ]; then
            while IFS= read -r target; do
              if ! grep -Fxq "$target" branches.txt; then
                echo "::error ::Branch \"$target\" given in \$BRANCH_ALIASES does not exist."
                exit 1
              fi
            done < targets.txt
          fi

          if [ -s aliases.txt ] && [ "$(sort aliases.txt | uniq -d | wc -l)" -gt 0 ]; then
            echo "::error ::Duplicate aliases in \$BRANCH_ALIASES: \"$BRANCH_ALIASES\""
            exit 1
          fi

  build-books:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: get-branches
    if: ${{ needs.get-branches.outputs.branches != '[]' }}
    permissions:
      pages: write
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.get-branches.outputs.branches) }}
    steps:
      - name: Checkout to branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          token: ${{ env.GH_TOKEN }}
          submodules: true

      - name: Record extra cache info
        shell: bash
        run: |
          set -euo pipefail

          find book/ -type f >> EXTRA_CACHE_VARS.txt

          if [ "$BRANCHES_TO_PREPROCESS" = "*" ] || echo "$BRANCHES_TO_PREPROCESS" | tr ' ' '\n' | grep -Fxq "${{ matrix.branch }}"; then
            echo true >> EXTRA_CACHE_VARS.txt
          else
            echo false >> EXTRA_CACHE_VARS.txt
          fi

          if echo "$BRANCHES_ARCHIVED" | tr ' ' '\n' | grep -Fxq "${{ matrix.branch }}"; then
            echo true >> EXTRA_CACHE_VARS.txt
          else
            echo false >> EXTRA_CACHE_VARS.txt
          fi

          cat EXTRA_CACHE_VARS.txt

      - name: Cache page build
        id: cache-html
        uses: actions/cache@v4
        with:
          path: book/_build/html
          key: html-build-${{ matrix.branch }}-${{ hashFiles('book/**', 'requirements.txt', 'EXTRA_CACHE_VARS.txt') }}

      - if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        name: Set up Python 3.11
        uses: actions/setup-python@v5
        id: setup-python
        with:
          python-version: '3.11'

      - if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        name: Record current date for cache
        run: echo "WEEK=$(date +%V)" >> "$GITHUB_ENV"

      - if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango1.0-dev \
            libcairo2-dev \
            pkg-config \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            latexmk \
            dvipng \
            gettext-base

      - if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        name: Cache virtualenv
        uses: actions/cache@v4
        with:
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}-week${{ env.WEEK }}-${{ github.repository }}
          path: .venv

      - if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail

          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"

      - if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        name: Insert banner if archived
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"

          if [ "$REPO" = "${OWNER}.github.io" ]; then
            SITE_URL="https://${OWNER}.github.io/"
          else
            SITE_URL="https://${OWNER}.github.io/${REPO}/"
          fi

          if echo "$BRANCHES_ARCHIVED" | tr ' ' '\n' | grep -Fxq "${{ matrix.branch }}"; then
            {
              echo 'html:'
              echo "  announcement: 'You are viewing an archived version of the book. Click <a href=\"${SITE_URL}${PRIMARY_BRANCH}\">here</a> for the latest version.'"
            } >> book/_config.yml
            cat book/_config.yml
          fi

      - if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        name: Preprocess & build the book from branch
        shell: bash
        run: |
          set -euo pipefail

          if [ "$BRANCHES_TO_PREPROCESS" = "*" ] || echo "$BRANCHES_TO_PREPROCESS" | tr ' ' '\n' | grep -Fxq "${{ matrix.branch }}"; then
            option_release='--release'
          else
            option_release=''
          fi

          teachbooks build $option_release book/ > >(tee stdout.log) 2> >(tee stderr.log >&2)

      - name: If failed, restore a book for this branch from cache
        if: failure()
        id: attempt-restore
        uses: actions/cache/restore@v4
        with:
          key: none
          path: book/_build/html
          restore-keys: html-build-${{ matrix.branch }}

      - name: Debug cache attempt output
        if: failure()
        run: |
          echo "cache-hit: ${{ steps.attempt-restore.outputs.cache-hit }}"
          echo "cache-primary-key: ${{ steps.attempt-restore.outputs.cache-primary-key }}"
          echo "cache-matched-key: ${{ steps.attempt-restore.outputs.cache-matched-key }}"

      - name: Record build failure
        if: failure()
        shell: bash
        run: |
          if [ -z "${{ steps.attempt-restore.outputs.cache-matched-key }}" ]; then
            echo ":o: \\\`Build failed [2]\\\`" | tee buildstatus.txt
          else
            echo ":red_circle: \\\`Build failed [1]\\\`" | tee buildstatus.txt
          fi

      - name: Record build success
        if: success()
        run: echo ":white_check_mark: \\\`Released\\\`" > buildstatus.txt

      - name: Make summary of errors, if any
        if: always()
        shell: bash
        run: |
          touch summary.md
          if [ -s stderr.log ]; then
            {
              echo "On branch \\\`${{ matrix.branch }}\\\`:"
              echo '```'
              cat stderr.log
              echo '```'
            } >> summary.md
          fi

      - name: Clean branch name of disallowed characters
        if: always()
        shell: bash
        run: |
          clean_branch=$(printf '%s' "${{ matrix.branch }}" | tr '/\":<>|*?\\' '-')
          echo "MATRIX_BRANCH_NAME_CLEAN=$clean_branch" >> "$GITHUB_ENV"

      - name: Upload summary as an artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: _summary-${{ env.MATRIX_BRANCH_NAME_CLEAN }}
          path: summary.md

      - name: Upload build status as an artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: _buildstatus-${{ env.MATRIX_BRANCH_NAME_CLEAN }}
          path: buildstatus.txt

      - name: Upload the built book HTML as an artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MATRIX_BRANCH_NAME_CLEAN }}
          path: book/_build/html

  deploy-books:
    if: always()
    needs:
      - get-branches
      - build-books
    timeout-minutes: 30
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    env:
      BRANCHES: ${{ needs.get-branches.outputs.branches }}
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ env.GH_TOKEN }}

      - run: mkdir -p final

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: final/

      - name: Extract extras from the downloaded artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _summaries _buildstatus
          mv final/_summary-* _summaries/ 2>/dev/null || true
          mv final/_buildstatus-* _buildstatus/ 2>/dev/null || true

      - name: Clean artifacts (1)
        uses: GeekyEggo/delete-artifact@v5.0.0
        with:
          name: _summary-*

      - name: Clean artifacts (2)
        uses: GeekyEggo/delete-artifact@v5.0.0
        with:
          name: _buildstatus-*

      - name: Compute site URL
        shell: bash
        run: |
          set -euo pipefail

          OWNER="${GITHUB_REPOSITORY%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"

          if [ "$REPO" = "${OWNER}.github.io" ]; then
            SITE_URL="https://${OWNER}.github.io/"
          else
            SITE_URL="https://${OWNER}.github.io/${REPO}/"
          fi

          echo "SITE_URL=$SITE_URL" >> "$GITHUB_ENV"

      - name: Copy primary book to root, fail if names conflict
        timeout-minutes: 1
        if: ${{ env.BEHAVIOR_PRIMARY == 'copy' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob
          if [ -d "final/$PRIMARY_BRANCH" ]; then
            cp -irv "final/$PRIMARY_BRANCH"/* final/
          fi

      - name: Move primary book to root
        timeout-minutes: 1
        if: ${{ env.BEHAVIOR_PRIMARY == 'move' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob
          if [ -d "final/$PRIMARY_BRANCH" ]; then
            mv -v "final/$PRIMARY_BRANCH"/* final/
            rm -rf "final/$PRIMARY_BRANCH"
          fi

      - name: Include overview summary
        shell: bash
        run: |
          set -euo pipefail

          echo '${{ needs.get-branches.outputs.branches }}' | jq -r '.[]' > raw.txt

          {
            echo "### Branches deployed"
            echo "| Branch :tanabata_tree: | Link :link: | Build status :ballot_box_with_check: |"
            echo "| :--- | :--- | :--- |"
          } > summary.md

          tr '/\":<>|*?\\' '-' < raw.txt > clean.txt

          : > status.txt
          while IFS= read -r clean; do
            if [ -f "_buildstatus/_buildstatus-$clean/buildstatus.txt" ]; then
              cat "_buildstatus/_buildstatus-$clean/buildstatus.txt" >> status.txt
            else
              echo ":o: \\\`Build status missing\\\`" >> status.txt
            fi
          done < clean.txt

          paste -d ';' raw.txt clean.txt status.txt > pasted.txt

          while IFS=';' read -r raw clean status; do
            if [ "$raw" = "$PRIMARY_BRANCH" ] && [ "$BEHAVIOR_PRIMARY" = "move" ]; then
              echo "| $raw | <${SITE_URL}> | $status |" >> summary.md
            else
              echo "| $raw | <${SITE_URL}${clean}> | $status |" >> summary.md
            fi
          done < pasted.txt

          primary_status=$(grep "^$PRIMARY_BRANCH;" pasted.txt | cut -d ';' -f3 || true)

          {
            echo
            echo "#### Legend for build status"
            echo ":white_check_mark: \\\`Released\\\` - build success, new version released."
            echo ":red_circle: \\\`Build failed [1]\\\` - build failure, previous version of the book reused."
            echo ":o: \\\`Build failed [2]\\\` - build failure, no previous version reused."
            echo
            echo "#### Primary book at root"
            if [ "$BEHAVIOR_PRIMARY" = "copy" ]; then
              echo "The book at the website root <${SITE_URL}> is from the primary branch \\\`$PRIMARY_BRANCH\\\`."
            elif [ "$BEHAVIOR_PRIMARY" = "redirect" ]; then
              echo "The book at the website root <${SITE_URL}> redirects to the primary branch \\\`$PRIMARY_BRANCH\\\`."
            elif [ "$BEHAVIOR_PRIMARY" = "move" ]; then
              echo "The book at the website root <${SITE_URL}> is from the primary branch \\\`$PRIMARY_BRANCH\\\`. It's deleted from the branch URL."
            fi
            echo "Status: ${primary_status:-Unknown}"
          } >> summary.md

      - name: Symlink and summarise branch aliases
        id: symlink-aliases
        shell: bash
        run: |
          set -euo pipefail

          echo "### Aliases" >> summary.md
          if echo "${BRANCH_ALIASES:-}" | grep -E '\S' >/dev/null; then
            {
              echo "| Alias :arrow_right: | Target :dart: | Link :link: | Build status :ballot_box_with_check: |"
              echo "| :--- | :--- | :--- | :--- |"
            } >> summary.md
          else
            echo "No aliases defined." >> summary.md
          fi

          paste -d ' ' clean.txt status.txt > lookup_status.txt

          echo "${BRANCH_ALIASES:-}" | tr ' ' '\n' | grep -E '\S' | while IFS=':' read -r key value; do
            if [ "$BRANCHES_TO_DEPLOY" = "*" ] || echo "$BRANCHES_TO_DEPLOY" | tr ' ' '\n' | grep -Fxq "$value"; then
              clean_key=$(printf '%s' "$key" | tr '/\":<>|*?\\' '-')
              clean_value=$(printf '%s' "$value" | tr '/\":<>|*?\\' '-')
              status=$(grep "^$clean_value " lookup_status.txt | cut -d' ' -f2- || true)
              echo "| $clean_key | $clean_value | <${SITE_URL}${clean_key}> | ${status:-Unknown} |" >> summary.md
              ln -sfn "$clean_value" "final/$key"
            fi
          done

      - name: Include summary of errors
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "### Preview of build errors & warnings"
            echo "For more details please see the corresponding \\\`build-books\\\` jobs in the left pane."
          } >> summary.md

          rm -f tmp.md
          for fname in _summaries/*; do
            [ -e "$fname" ] || continue
            if [ -f "$fname/summary.md" ]; then
              cat "$fname/summary.md" >> tmp.md
            fi
          done

          if [ -s tmp.md ]; then
            cat tmp.md >> summary.md
          else
            echo "No build errors or warnings encountered." >> summary.md
          fi

      - name: Add a custom 404 to redirect
        env:
          HTML_TEMPLATE_404_REDIRECT: |
            <!DOCTYPE html>
            <html lang="en">
            <head>
                <meta charset="UTF-8">
                <meta name="viewport" content="width=device-width, initial-scale=1.0">
                <title>Page Not Found</title>
                <link rel="icon" href="https://teachbooks.io/wp-content/uploads/2024/12/cropped-TB_favicon-32x32.png" type="image/png">
                <style>
                    body {
                        font-family: Arial, sans-serif;
                        margin: 0;
                        padding: 0;
                        background-color: #f4f4f4;
                        color: #333;
                    }
                    .container {
                        max-width: 800px;
                        margin: 50px auto;
                        padding: 20px 20px 20px 20px;
                        padding-top: 100px;
                        background-color: #fff;
                        box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
                        position: relative;
                        border-radius: 8px;
                    }
                    .logo {
                        position: absolute;
                        top: 10px;
                        right: 10px;
                        width: 200px;
                        padding: 10px;
                        background-color: #fff;
                        border-radius: 5px;
                        box-shadow: 0 0 5px rgba(0, 0, 0, 0.1);
                        transition: transform 0.2s;
                    }
                    .logo:hover {
                        transform: scale(1.02);
                    }
                    @media (max-width: 768px) {
                        .container {
                            margin: 20px;
                            padding: 20px;
                            padding-top: 40px;
                        }
                        .logo {
                            position: static;
                            display: block;
                            margin: 0 auto 20px auto;
                            width: 150px;
                        }
                        .button-container .btn {
                            display: block !important;
                            margin: 15px auto !important;
                            max-width: 250px;
                            width: 90%;
                        }
                    }
                    @media (max-width: 480px) {
                        .logo {
                            width: 120px;
                        }
                        .error-code {
                            font-size: 3em;
                        }
                        h1 {
                            font-size: 2em;
                        }
                        .button-container .btn {
                            display: block !important;
                            margin: 20px auto !important;
                            max-width: 200px;
                            width: 80%;
                        }
                        .button-container {
                            margin: 40px 0;
                        }
                    }
                    h1 {
                        font-family: 'Courier New', monospace, Arial, sans-serif;
                        color: #85A5FF;
                        font-size: 2.5em;
                        margin-bottom: 20px;
                        text-align: center;
                    }
                    .error-code {
                        font-family: 'Courier New', monospace, Arial, sans-serif;
                        font-size: 4em;
                        color: #FFD400;
                        text-align: center;
                        margin: 20px 0;
                        font-weight: bold;
                        text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
                    }
                    p {
                        font-size: 1.1em;
                        line-height: 1.6;
                        margin-bottom: 20px;
                        text-align: center;
                        color: #3B60E4;
                    }
                    .redirecting {
                        display: none;
                        text-align: center;
                        font-style: italic;
                        color: #3B60E4;
                        font-weight: 500;
                    }
                    .spinner {
                        border: 2px solid #f3f3f3;
                        border-top: 2px solid #FFD400;
                        border-radius: 50%;
                        width: 20px;
                        height: 20px;
                        animation: spin 1s linear infinite;
                        display: inline-block;
                        margin-right: 10px;
                    }
                    .button-container {
                        text-align: center;
                        margin: 30px 0;
                    }
                    .btn {
                        display: inline-block;
                        background-color: #85A5FF;
                        color: white;
                        padding: 12px 24px;
                        text-decoration: none;
                        border-radius: 5px;
                        margin: 0 10px;
                        transition: background-color 0.3s;
                    }
                    .btn:hover {
                        background-color: #6B8FFF;
                        text-decoration: none;
                    }
                    .btn-secondary {
                        background-color: #F0F4FF;
                        color: #85A5FF;
                        border: 1px solid #85A5FF;
                    }
                    .btn-secondary:hover {
                        background-color: #E1EBFF;
                        color: #6B8FFF;
                    }
                    .btn-github {
                        background-color: #3B60E4;
                        color: white;
                        border: 1px solid #3B60E4;
                    }
                    .btn-github:hover {
                        background-color: #2A4BC7;
                        color: white;
                    }
                    @keyframes spin {
                        0% { transform: rotate(0deg); }
                        100% { transform: rotate(360deg); }
                    }
                </style>
            </head>
            <body>
                <div class="container">
                    <a href="https://teachbooks.io/" target="_blank">
                        <img src="https://teachbooks.io/wp-content/uploads/2025/01/GIF_TeachBooks_01_Square_800x800_Alpha.gif" alt="TeachBooks Logo" class="logo">
                    </a>
                    <div class="error-code">404</div>
                    <h1 id="page-title">Page Not Found</h1>
                    <div id="content">
                        <p>The page you're looking for doesn't exist.</p>
                        <div class="button-container">
                            <a href="#" id="root-link" class="btn">Go to Homepage</a>
                            <a href="javascript:history.back()" class="btn btn-secondary">Go Back</a>
                            <a href="#" id="github-link" class="btn btn-github">Go to Source Code</a>
                        </div>
                    </div>
                    <div id="redirecting" class="redirecting">
                        <div class="spinner"></div>
                        Redirecting you to the correct page...
                    </div>
                </div>
                <script>
                let currentUrl = window.location.href;
                let urlParts = currentUrl.split('/');
                let bname = urlParts[4];
                let branches = $BRANCHES;
                let behaviorPrimary = '$BEHAVIOR_PRIMARY';
                let rootUrl = urlParts.slice(0, 4).join('/') + '/';
                let githubUrl = 'https://github.com/$GITHUB_REPOSITORY';
                document.getElementById('root-link').href = rootUrl;
                document.getElementById('github-link').href = githubUrl;

                if (behaviorPrimary === 'redirect' && !branches.includes(bname)) {
                    document.getElementById('page-title').textContent = 'Redirecting...';
                    document.getElementById('content').style.display = 'none';
                    document.getElementById('redirecting').style.display = 'block';

                    setTimeout(function() {
                        urlParts.splice(4, 0, '$PRIMARY_BRANCH');
                        let newUrl = urlParts.join('/');
                        window.location.href = newUrl;
                    }, 0);
                }
                </script>
            </body>
            </html>
        run: |
          echo "$HTML_TEMPLATE_404_REDIRECT" | envsubst | tee final/404.html

      - name: Upload final Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: final/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload summary as artifact
        uses: actions/upload-artifact@v4
        with:
          name: _final-summary
          path: summary.md

  summarize:
    if: always()
    needs:
      - get-branches
      - deploy-books
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Download final summary artifact
        uses: actions/download-artifact@v4
        with:
          name: _final-summary
          path: ./

      - name: Summarize
        shell: bash
        run: |
          set -euo pipefail

          if [ -f summary.md ]; then
            cat summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "An unknown error has occurred, cannot display summary. It may be there were too many errors or warnings in the book build process."
              echo
              echo "- You can try building the books locally, or inspecting the workflow run logs to troubleshoot the issue."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          isdefault() {
            if [ -z "$1" ]; then
              echo '(default value used)'
            else
              echo ''
            fi
          }

          {
            echo "### Repository configuration variables"
            echo "Variables can be set at ${{ format('{0}/{1}/settings/variables/actions', github.server_url, github.repository) }}"
            echo '```'
            echo "PRIMARY_BRANCH=$PRIMARY_BRANCH $(isdefault '${{ vars.PRIMARY_BRANCH }}')"
            echo "BEHAVIOR_PRIMARY=$BEHAVIOR_PRIMARY $(isdefault '${{ vars.BEHAVIOR_PRIMARY }}')"
            echo "BRANCH_ALIASES=$BRANCH_ALIASES $(isdefault '${{ vars.BRANCH_ALIASES }}')"
            echo "BRANCHES_TO_DEPLOY=$BRANCHES_TO_DEPLOY $(isdefault '${{ vars.BRANCHES_TO_DEPLOY }}')"
            echo "BRANCHES_TO_PREPROCESS=$BRANCHES_TO_PREPROCESS $(isdefault '${{ vars.BRANCHES_TO_PREPROCESS }}')"
            echo "BRANCHES_ARCHIVED=$BRANCHES_ARCHIVED $(isdefault '${{ vars.BRANCHES_ARCHIVED }}')"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

