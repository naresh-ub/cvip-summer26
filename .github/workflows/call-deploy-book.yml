name: deploy-book

on:
  workflow_dispatch:
  push:
    branches:
      - '**'

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  GH_TOKEN: ${{ secrets.GH_PAT != '' && secrets.GH_PAT || secrets.GITHUB_TOKEN }}
  PRIMARY_BRANCH: ${{ vars.PRIMARY_BRANCH != '' && vars.PRIMARY_BRANCH || 'main' }}
  BEHAVIOR_PRIMARY: ${{ vars.BEHAVIOR_PRIMARY != '' && vars.BEHAVIOR_PRIMARY || 'move' }}
  BRANCH_ALIASES: ${{ vars.BRANCH_ALIASES }}
  BRANCHES_TO_DEPLOY: ${{ vars.BRANCHES_TO_DEPLOY != '' && vars.BRANCHES_TO_DEPLOY || '*' }}
  BRANCHES_TO_PREPROCESS: ${{ vars.BRANCHES_TO_PREPROCESS }}
  BRANCHES_ARCHIVED: ${{ vars.BRANCHES_ARCHIVED }}

jobs:
  get-branches:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    outputs:
      branches: ${{ steps.set-branches.outputs.branches }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: set-branches
        name: Set branches
        shell: bash
        run: |
          set -euo pipefail

          if [ "$BRANCHES_TO_DEPLOY" = "*" ]; then
            branches=$(git branch -r | sed 's,^[[:space:]]*origin/,,g' | grep -v '\->' || true)
          else
            branches=$(echo "$BRANCHES_TO_DEPLOY" | tr ' ' '\n' | grep -E '\S' || true)
          fi

          printf '%s\n' "$branches" > branches.txt
          branches_json=$(printf '%s\n' "$branches" | jq -Rn '[inputs | select(length > 0)]')
          echo "branches=$branches_json" >> "$GITHUB_OUTPUT"

      - name: Validate aliases
        shell: bash
        run: |
          set -euo pipefail

          printf '%s\n' "${BRANCH_ALIASES:-}" | tr ' ' '\n' | grep -E '\S' > rules.txt || true
          cut -d: -f1 rules.txt > aliases.txt || true
          cut -d: -f2 rules.txt > targets.txt || true

          if [ -s aliases.txt ]; then
            while IFS= read -r alias; do
              if grep -Fxq "$alias" branches.txt; then
                echo "::error::Alias \"$alias\" conflicts with an existing branch."
                exit 1
              fi
            done < aliases.txt
          fi

          if [ -s targets.txt ]; then
            while IFS= read -r target; do
              if ! grep -Fxq "$target" branches.txt; then
                echo "::error::Target branch \"$target\" in BRANCH_ALIASES does not exist."
                exit 1
              fi
            done < targets.txt
          fi

          if [ -s aliases.txt ] && [ "$(sort aliases.txt | uniq -d | wc -l)" -gt 0 ]; then
            echo "::error::Duplicate aliases found in BRANCH_ALIASES."
            exit 1
          fi

  build-books:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: get-branches
    if: ${{ needs.get-branches.outputs.branches != '[]' }}
    permissions:
      pages: write
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        branch: ${{ fromJson(needs.get-branches.outputs.branches) }}

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: ${{ matrix.branch }}
          token: ${{ env.GH_TOKEN }}
          submodules: true

      - name: Record extra cache info
        shell: bash
        run: |
          set -euo pipefail

          find book/ -type f >> EXTRA_CACHE_VARS.txt

          if [ "$BRANCHES_TO_PREPROCESS" = "*" ] || echo "$BRANCHES_TO_PREPROCESS" | tr ' ' '\n' | grep -Fxq "${{ matrix.branch }}"; then
            echo true >> EXTRA_CACHE_VARS.txt
          else
            echo false >> EXTRA_CACHE_VARS.txt
          fi

          if echo "$BRANCHES_ARCHIVED" | tr ' ' '\n' | grep -Fxq "${{ matrix.branch }}"; then
            echo true >> EXTRA_CACHE_VARS.txt
          else
            echo false >> EXTRA_CACHE_VARS.txt
          fi

      - name: Cache page build
        id: cache-html
        uses: actions/cache@v4
        with:
          path: book/_build/html
          key: html-build-${{ matrix.branch }}-${{ hashFiles('book/**', 'requirements.txt', 'EXTRA_CACHE_VARS.txt') }}

      - name: Set up Python
        if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        id: setup-python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Record current week
        if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        run: echo "WEEK=$(date +%V)" >> "$GITHUB_ENV"

      - name: Install system dependencies
        if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libpango1.0-dev \
            libcairo2-dev \
            pkg-config \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-fonts-extra \
            latexmk \
            dvipng \
            gettext-base

      - name: Cache virtualenv
        if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        uses: actions/cache@v4
        with:
          key: venv-${{ runner.os }}-${{ steps.setup-python.outputs.python-version }}-${{ hashFiles('requirements.txt') }}-week${{ env.WEEK }}-${{ github.repository }}
          path: .venv

      - name: Install dependencies
        if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          python -m venv .venv
          source .venv/bin/activate
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          echo "$VIRTUAL_ENV/bin" >> "$GITHUB_PATH"
          echo "VIRTUAL_ENV=$VIRTUAL_ENV" >> "$GITHUB_ENV"

      - name: Insert banner if archived
        if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"

          if [ "$repo" = "${owner}.github.io" ]; then
            site_url="https://${owner}.github.io/"
          else
            site_url="https://${owner}.github.io/${repo}/"
          fi

          if echo "$BRANCHES_ARCHIVED" | tr ' ' '\n' | grep -Fxq "${{ matrix.branch }}"; then
            {
              echo 'html:'
              echo "  announcement: 'You are viewing an archived version of the book. Click <a href=\"${site_url}${PRIMARY_BRANCH}\">here</a> for the latest version.'"
            } >> book/_config.yml
          fi

      - name: Build book
        if: ${{ steps.cache-html.outputs.cache-hit != 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          if [ "$BRANCHES_TO_PREPROCESS" = "*" ] || echo "$BRANCHES_TO_PREPROCESS" | tr ' ' '\n' | grep -Fxq "${{ matrix.branch }}"; then
            option_release='--release'
          else
            option_release=''
          fi

          teachbooks build $option_release book/ > >(tee stdout.log) 2> >(tee stderr.log >&2)

      - name: Restore cached build if failed
        if: failure()
        id: attempt-restore
        uses: actions/cache/restore@v4
        with:
          key: none
          path: book/_build/html
          restore-keys: html-build-${{ matrix.branch }}

      - name: Record build failure
        if: failure()
        shell: bash
        run: |
          if [ -z "${{ steps.attempt-restore.outputs.cache-matched-key }}" ]; then
            echo ":o: \`Build failed [2]\`" > buildstatus.txt
          else
            echo ":red_circle: \`Build failed [1]\`" > buildstatus.txt
          fi

      - name: Record build success
        if: success()
        run: echo ":white_check_mark: \`Released\`" > buildstatus.txt

      - name: Make summary of errors
        if: always()
        shell: bash
        run: |
          touch summary.md
          if [ -s stderr.log ]; then
            {
              echo "On branch \`${{ matrix.branch }}\`:"
              echo '```'
              cat stderr.log
              echo '```'
            } >> summary.md
          fi

      - name: Clean branch name
        if: always()
        shell: bash
        run: |
          clean_branch=$(printf '%s' "${{ matrix.branch }}" | tr '/\":<>|*?\\' '-')
          echo "MATRIX_BRANCH_NAME_CLEAN=$clean_branch" >> "$GITHUB_ENV"

      - name: Upload summary artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: _summary-${{ env.MATRIX_BRANCH_NAME_CLEAN }}
          path: summary.md

      - name: Upload build status artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: _buildstatus-${{ env.MATRIX_BRANCH_NAME_CLEAN }}
          path: buildstatus.txt

      - name: Upload built HTML artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.MATRIX_BRANCH_NAME_CLEAN }}
          path: book/_build/html

  deploy-books:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs:
      - get-branches
      - build-books
    permissions:
      pages: write
      id-token: write
      contents: read
    env:
      BRANCHES: ${{ needs.get-branches.outputs.branches }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ env.GH_TOKEN }}

      - name: Make final folder
        run: mkdir -p final

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: final/

      - name: Extract extras
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _summaries _buildstatus
          mv final/_summary-* _summaries/ 2>/dev/null || true
          mv final/_buildstatus-* _buildstatus/ 2>/dev/null || true

      - name: Delete summary artifacts
        uses: GeekyEggo/delete-artifact@v5.0.0
        with:
          name: _summary-*

      - name: Delete buildstatus artifacts
        uses: GeekyEggo/delete-artifact@v5.0.0
        with:
          name: _buildstatus-*

      - name: Compute site URL
        shell: bash
        run: |
          set -euo pipefail

          owner="${GITHUB_REPOSITORY%/*}"
          repo="${GITHUB_REPOSITORY#*/}"

          if [ "$repo" = "${owner}.github.io" ]; then
            site_url="https://${owner}.github.io/"
          else
            site_url="https://${owner}.github.io/${repo}/"
          fi

          echo "SITE_URL=$site_url" >> "$GITHUB_ENV"

      - name: Copy primary book to root
        if: ${{ env.BEHAVIOR_PRIMARY == 'copy' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob
          if [ -d "final/$PRIMARY_BRANCH" ]; then
            cp -irv "final/$PRIMARY_BRANCH"/* final/
          fi

      - name: Move primary book to root
        if: ${{ env.BEHAVIOR_PRIMARY == 'move' }}
        shell: bash
        run: |
          set -euo pipefail
          shopt -s dotglob nullglob
          if [ -d "final/$PRIMARY_BRANCH" ]; then
            mv -v "final/$PRIMARY_BRANCH"/* final/
            rm -rf "final/$PRIMARY_BRANCH"
          fi

      - name: Include overview summary
        shell: bash
        run: |
          set -euo pipefail

          echo '${{ needs.get-branches.outputs.branches }}' | jq -r '.[]' > raw.txt

          {
            echo "### Branches deployed"
            echo "| Branch :tanabata_tree: | Link :link: | Build status :ballot_box_with_check: |"
            echo "| :--- | :--- | :--- |"
          } > summary.md

          tr '/\":<>|*?\\' '-' < raw.txt > clean.txt

          : > status.txt
          while IFS= read -r clean; do
            if [ -f "_buildstatus/_buildstatus-$clean/buildstatus.txt" ]; then
              cat "_buildstatus/_buildstatus-$clean/buildstatus.txt" >> status.txt
            else
              echo ":o: \`Build status missing\`" >> status.txt
            fi
          done < clean.txt

          paste -d ';' raw.txt clean.txt status.txt > pasted.txt

          while IFS=';' read -r raw clean status; do
            if [ "$raw" = "$PRIMARY_BRANCH" ] && [ "$BEHAVIOR_PRIMARY" = "move" ]; then
              echo "| $raw | <${SITE_URL}> | $status |" >> summary.md
            else
              echo "| $raw | <${SITE_URL}${clean}> | $status |" >> summary.md
            fi
          done < pasted.txt

          primary_status=$(grep "^$PRIMARY_BRANCH;" pasted.txt | cut -d ';' -f3 || true)

          {
            echo
            echo "#### Legend for build status"
            echo ":white_check_mark: \`Released\` - build success, new version released."
            echo ":red_circle: \`Build failed [1]\` - build failure, previous version reused."
            echo ":o: \`Build failed [2]\` - build failure, no previous version reused."
            echo
            echo "#### Primary book at root"
            if [ "$BEHAVIOR_PRIMARY" = "copy" ]; then
              echo "The book at the website root <${SITE_URL}> is from the primary branch \`$PRIMARY_BRANCH\`."
            elif [ "$BEHAVIOR_PRIMARY" = "redirect" ]; then
              echo "The book at the website root <${SITE_URL}> redirects to the primary branch \`$PRIMARY_BRANCH\`."
            elif [ "$BEHAVIOR_PRIMARY" = "move" ]; then
              echo "The book at the website root <${SITE_URL}> is from the primary branch \`$PRIMARY_BRANCH\`. It's deleted from the branch URL."
            fi
            echo "Status: ${primary_status:-Unknown}"
          } >> summary.md

      - name: Symlink and summarise branch aliases
        shell: bash
        run: |
          set -euo pipefail

          echo "### Aliases" >> summary.md

          if echo "${BRANCH_ALIASES:-}" | grep -E '\S' >/dev/null; then
            {
              echo "| Alias :arrow_right: | Target :dart: | Link :link: | Build status :ballot_box_with_check: |"
              echo "| :--- | :--- | :--- | :--- |"
            } >> summary.md
          else
            echo "No aliases defined." >> summary.md
          fi

          paste -d ' ' clean.txt status.txt > lookup_status.txt

          echo "${BRANCH_ALIASES:-}" | tr ' ' '\n' | grep -E '\S' | while IFS=':' read -r key value; do
            if [ "$BRANCHES_TO_DEPLOY" = "*" ] || echo "$BRANCHES_TO_DEPLOY" | tr ' ' '\n' | grep -Fxq "$value"; then
              clean_key=$(printf '%s' "$key" | tr '/\":<>|*?\\' '-')
              clean_value=$(printf '%s' "$value" | tr '/\":<>|*?\\' '-')
              status=$(grep "^$clean_value " lookup_status.txt | cut -d' ' -f2- || true)
              echo "| $clean_key | $clean_value | <${SITE_URL}${clean_key}> | ${status:-Unknown} |" >> summary.md
              ln -sfn "$clean_value" "final/$key"
            fi
          done

      - name: Include summary of errors
        shell: bash
        run: |
          set -euo pipefail

          {
            echo "### Preview of build errors & warnings"
            echo "For more details please see the corresponding \`build-books\` jobs in the left pane."
          } >> summary.md

          rm -f tmp.md
          for fname in _summaries/*; do
            [ -e "$fname" ] || continue
            if [ -f "$fname/summary.md" ]; then
              cat "$fname/summary.md" >> tmp.md
            fi
          done

          if [ -s tmp.md ]; then
            cat tmp.md >> summary.md
          else
            echo "No build errors or warnings encountered." >> summary.md
          fi

      - name: Add custom 404
        env:
          HTML_TEMPLATE_404_REDIRECT: |
            <!DOCTYPE html>
            <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Page Not Found</title>
            </head>
            <body>
              <script>
                let currentUrl = window.location.href;
                let urlParts = currentUrl.split('/');
                let bname = urlParts[4];
                let branches = $BRANCHES;
                let behaviorPrimary = '$BEHAVIOR_PRIMARY';
                let rootUrl = urlParts.slice(0, 4).join('/') + '/';
                let githubUrl = 'https://github.com/$GITHUB_REPOSITORY';

                if (behaviorPrimary === 'redirect' && !branches.includes(bname)) {
                  urlParts.splice(4, 0, '$PRIMARY_BRANCH');
                  let newUrl = urlParts.join('/');
                  window.location.href = newUrl;
                } else {
                  document.body.innerHTML = `
                    <div style="font-family: Arial, sans-serif; max-width: 800px; margin: 60px auto; text-align: center;">
                      <h1>404 - Page Not Found</h1>
                      <p>The page you're looking for doesn't exist.</p>
                      <p><a href="${rootUrl}">Go to Homepage</a></p>
                      <p><a href="${githubUrl}">Go to Source Code</a></p>
                    </div>
                  `;
                }
              </script>
            </body>
            </html>
        run: |
          echo "$HTML_TEMPLATE_404_REDIRECT" | envsubst > final/404.html

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: final/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Upload final summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: _final-summary
          path: summary.md

  summarize:
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs:
      - get-branches
      - deploy-books

    steps:
      - name: Download final summary artifact
        uses: actions/download-artifact@v4
        with:
          name: _final-summary
          path: ./

      - name: Summarize
        shell: bash
        run: |
          set -euo pipefail

          if [ -f summary.md ]; then
            cat summary.md >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "An unknown error has occurred, cannot display summary."
              echo
              echo "- You can try building the books locally, or inspect the workflow logs."
            } >> "$GITHUB_STEP_SUMMARY"
          fi

          isdefault() {
            if [ -z "$1" ]; then
              echo "(default value used)"
            else
              echo ""
            fi
          }

          {
            echo "### Repository configuration variables"
            echo '```'
            echo "PRIMARY_BRANCH=$PRIMARY_BRANCH $(isdefault '${{ vars.PRIMARY_BRANCH }}')"
            echo "BEHAVIOR_PRIMARY=$BEHAVIOR_PRIMARY $(isdefault '${{ vars.BEHAVIOR_PRIMARY }}')"
            echo "BRANCH_ALIASES=$BRANCH_ALIASES $(isdefault '${{ vars.BRANCH_ALIASES }}')"
            echo "BRANCHES_TO_DEPLOY=$BRANCHES_TO_DEPLOY $(isdefault '${{ vars.BRANCHES_TO_DEPLOY }}')"
            echo "BRANCHES_TO_PREPROCESS=$BRANCHES_TO_PREPROCESS $(isdefault '${{ vars.BRANCHES_TO_PREPROCESS }}')"
            echo "BRANCHES_ARCHIVED=$BRANCHES_ARCHIVED $(isdefault '${{ vars.BRANCHES_ARCHIVED }}')"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

permissions:
  contents: read
  pages: write
  id-token: write
